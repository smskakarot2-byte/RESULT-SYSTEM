openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: GCUF Result Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser authentication endpoints
  - name: departments
    description: Department management
  - name: users
    description: User management
  - name: courses
    description: Course management
  - name: results
    description: Student results
  - name: analytics
    description: Analytics and rankings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  # ─── Departments ──────────────────────────────────────────────
  /departments:
    get:
      operationId: getDepartments
      tags: [departments]
      summary: List all departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"

    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create a new department (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentBody"
      responses:
        "201":
          description: Created department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /departments/{id}:
    patch:
      operationId: updateDepartment
      tags: [departments]
      summary: Rename a department (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentBody"
      responses:
        "200":
          description: Updated department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

    delete:
      operationId: deleteDepartment
      tags: [departments]
      summary: Delete a department (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Users ────────────────────────────────────────────────────
  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: List all system users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SystemUser"

    post:
      operationId: createSystemUser
      tags: [users]
      summary: Create a professor account (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemUser"

  /users/{id}:
    delete:
      operationId: deleteSystemUser
      tags: [users]
      summary: Delete a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /users/me/profile:
    get:
      operationId: getMyProfile
      tags: [users]
      summary: Get my GCUF profile (role, department)
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyProfile"

  # ─── Courses ──────────────────────────────────────────────────
  /courses:
    get:
      operationId: getCourses
      tags: [courses]
      summary: List courses (filtered by department for professors)
      parameters:
        - name: departmentId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"

  /courses/{id}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get a course by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

    delete:
      operationId: deleteCourse
      tags: [courses]
      summary: Delete a course and its results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /courses/upload:
    post:
      operationId: uploadAwardSheet
      tags: [courses]
      summary: Upload and parse a GCUF Award Sheet PDF
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                departmentId:
                  type: integer
      responses:
        "201":
          description: Parsed and saved course with results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResult"

  # ─── Results ──────────────────────────────────────────────────
  /results/course/{courseId}:
    get:
      operationId: getCourseResults
      tags: [results]
      summary: Get all student results for a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentResult"

  /results/student:
    get:
      operationId: getStudentResults
      tags: [results]
      summary: Lookup results by roll number and session
      parameters:
        - name: rollNo
          in: query
          required: true
          schema:
            type: string
        - name: session
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Student results across all courses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentLookupResult"

  /results/transcript/{rollNo}:
    get:
      operationId: downloadTranscript
      tags: [results]
      summary: Download PDF transcript for a student
      parameters:
        - name: rollNo
          in: path
          required: true
          schema:
            type: string
        - name: session
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  # ─── Analytics ────────────────────────────────────────────────
  /analytics/overview:
    get:
      operationId: getAnalyticsOverview
      tags: [analytics]
      summary: Global dashboard stats
      responses:
        "200":
          description: Overview stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverview"

  /analytics/departments:
    get:
      operationId: getDepartmentAnalytics
      tags: [analytics]
      summary: Per-department average scores and student counts
      responses:
        "200":
          description: Department analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepartmentStat"

  /analytics/toppers:
    get:
      operationId: getToppers
      tags: [analytics]
      summary: Session and department toppers ranked by percentage
      parameters:
        - name: session
          in: query
          required: false
          schema:
            type: string
        - name: departmentId
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Toppers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topper"

  /analytics/sessions:
    get:
      operationId: getSessions
      tags: [analytics]
      summary: Get all unique sessions in the system
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      schema:
        type: string
    SessionCookie:
      name: connect.sid
      in: cookie
      required: false
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    AuthUserEnvelope:
      type: object
      properties:
        user:
          type: ["object", "null"]
          properties:
            id:
              type: string
            email:
              type: ["string", "null"]
            firstName:
              type: ["string", "null"]
            lastName:
              type: ["string", "null"]
            profileImageUrl:
              type: ["string", "null"]
          required: [id]
      required: [user]

    Department:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
      required: [id, name]

    CreateDepartmentBody:
      type: object
      properties:
        name:
          type: string
      required: [name]

    SystemUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        role:
          type: string
        departmentId:
          type: ["integer", "null"]
        departmentName:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, username, role]

    CreateUserBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        fullName:
          type: string
        role:
          type: string
        departmentId:
          type: ["integer", "null"]
      required: [username, password, role]

    MyProfile:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        role:
          type: string
        departmentId:
          type: ["integer", "null"]
        departmentName:
          type: ["string", "null"]
      required: [id, username, role]

    Course:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        title:
          type: string
        creditHoursRaw:
          type: string
        creditHours:
          type: number
        session:
          type: string
        semester:
          type: string
        departmentId:
          type: integer
        departmentName:
          type: ["string", "null"]
        maxMarks:
          type: number
        studentCount:
          type: integer
        passCount:
          type: integer
        avgPercentage:
          type: number
        createdAt:
          type: string
      required: [id, code, title, session, departmentId, creditHours, maxMarks]

    UploadResult:
      type: object
      properties:
        course:
          $ref: "#/components/schemas/Course"
        importedCount:
          type: integer
        passCount:
          type: integer
        failCount:
          type: integer
        header:
          type: object
          additionalProperties: true
      required: [importedCount, passCount, failCount]

    StudentResult:
      type: object
      properties:
        id:
          type: integer
        rollNo:
          type: string
        name:
          type: string
        fatherName:
          type: string
        cnic:
          type: string
        session:
          type: string
        internalMarks:
          type: number
        midTerm:
          type: number
        finalTerm:
          type: number
        practicalWork:
          type: number
        totalObtained:
          type: number
        percentage:
          type: number
        grade:
          type: string
        gradePoint:
          type: number
        status:
          type: string
      required: [id, rollNo, name, percentage, grade, status]

    StudentLookupResult:
      type: object
      properties:
        student:
          type: object
          properties:
            rollNo:
              type: string
            name:
              type: string
            fatherName:
              type: string
            cnic:
              type: string
            session:
              type: string
            departmentName:
              type: ["string", "null"]
          required: [rollNo, name]
        results:
          type: array
          items:
            $ref: "#/components/schemas/StudentResult"
        cgpa:
          type: number
        totalCredits:
          type: number
        passCount:
          type: integer
        failCount:
          type: integer
      required: [student, results, cgpa]

    AnalyticsOverview:
      type: object
      properties:
        departmentCount:
          type: integer
        courseCount:
          type: integer
        studentCount:
          type: integer
        userCount:
          type: integer
        avgPercentage:
          type: number
        passRate:
          type: number
      required: [departmentCount, courseCount, studentCount, userCount, avgPercentage, passRate]

    DepartmentStat:
      type: object
      properties:
        departmentId:
          type: integer
        departmentName:
          type: string
        studentCount:
          type: integer
        courseCount:
          type: integer
        avgPercentage:
          type: number
        passRate:
          type: number
      required: [departmentId, departmentName, studentCount, avgPercentage]

    Topper:
      type: object
      properties:
        rollNo:
          type: string
        name:
          type: string
        session:
          type: string
        departmentName:
          type: ["string", "null"]
        avgPercentage:
          type: number
        cgpa:
          type: number
        rank:
          type: integer
      required: [rollNo, name, avgPercentage, cgpa, rank]
